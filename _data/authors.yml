authors:
- id: gelderloos
  name: Питер Гелдерлоос
  name_en: Peter Gelderloos
  bio: 'Американский анархист, активист и автор. Известен своей критикой ненасилия
    как политической стратегии и работами о тюремной системе. Участвовал в различных
    движениях социальной справедливости в США и Испании. Среди его книг — «Как ненасилие
    защищает государство», «Анархия работает» и «Тюрьма».
    '
  portrait: null
- id: malatesta
  name: Эррико Малатеста
  name_en: Errico Malatesta
  bio: 'Итальянский анархист-коммунист (1853–1932). Один из наиболее значимых мыслителей
    анархизма, соратник Михаила Бакунина и Пётра Кропоткина. Посвятил жизнь революционной
    агитации и пропаганде анархистских идей по всему миру — в Италии, Великобритании,
    Аргентине и США.

    '
  portrait: null
- id: black
  name: Боб Блэк
  name_en: Bob Black
  bio: 'Американский анархист и постлевый мыслитель. Наиболее известен своим эссе
    «Упразднение работы» (1985), в котором критикует трудовую этику и отстаивает право
    людей на игру и свободное время как альтернативу отчуждённому наёмному труду.

    '
  portrait: null
- id: dedok
  name: Николай Дедок
  name_en: Nikolai Dedok
  bio: 'Беларусский анархист и политический заключённый. Провёл несколько лет в застенках
    беларусских тюрем за антиправительственную деятельность. Автор книги «Цвета параллельного
    мира» — документального свидетельства о жизни за решёткой и борьбе за человеческое
    достоинство.

    '
  portrait: null
- id: ward
  name: Колин Вард
  name_en: Colin Ward
  bio: 'Британский анархист и писатель (1924–2010). На протяжении десяти лет редактировал
    журнал Freedom. Его работы отличаются практическим подходом к анархизму, сосредоточенным
    на самоорганизации, взаимопомощи и горизонтальных структурах в повседневной жизни.

    '
  portrait: null
- id: cameron
  name: Сара Камерон
  name_en: Sarah Cameron
  bio: 'Историкесса, специализирующаяся на истории Советского Союза и Центральной
    Азии. Авторка книги «Голодная степь: голод, насилие и создание Советского Казахстана»
    — исследования о советской коллективизации и её катастрофических последствиях.

    '
  portrait: null
- id: glushakov
  name: Юрий Глушаков
  name_en: Yuri Glushakov
  bio: 'Беларусский историк и публицист анархистских взглядов. Исследует историю революционных
    и анархистских движений на территории бывшей Российской империи и СССР, в особенности
    на территории Беларуси.

    '
  portrait: null
- id: crimethinc
  name: CrimethInc.
  name_en: CrimethInc.
  bio: 'Децентрализованный анархистский коллектив, существующий с 1990-х годов. Публикует
    книги, брошюры и другие материалы, пропагандирующие анархизм, антикапитализм и
    прямое действие. «Борьба за наши жизни» — одна из их наиболее известных работ.

    '
  portrait: null
- id: kosovo
  name: Петя Косово
  name_en: Petya Kosovo
  bio: 'Так же известен как Петр Силаев. Писатель, антифашист, политбеженец, бывший
    вокалист группы "Проверочная линейка". Покинул Россию в 2010 году после акции
    левых активистов у здания горадминистрации Химок, одним из организаторов которой
    следствие считало его.

    '
  portrait: null
- id: agamalova
  name: Лолита Агамалова
  bio: 'Российская поэтесса и активистка, родилась в 1997 году в Грозном. Её творчество
    сочетает анархофеминистскую и квир-тематику с трансгрессивной образностью. Стихи
    публиковались в антологии «F Letter: New Russian Feminist Poetry».'
  portrait: null
  name_en: Lolita Agamalova
- id: astashin
  name: Иван Асташин
  bio: Российский анархист. В 2012 году осуждён на 11 лет заключения за участие в
    серии поджогов административных зданий. Один из наиболее известных политических
    заключённых российского анархистского движения 2010-х годов.
  portrait: null
  name_en: Ivan Astashin
- id: avt-dejstvie
  name: Автономное действие
  bio: Российская анархистская федерация, основанная в 2002 году. Объединяет группы
    анархо-коммунистов по всей России, ведёт деятельность в области антифашизма, профсоюзной
    борьбы и экологии. Одна из крупнейших анархистских организаций постсоветского
    пространства.
  portrait: null
  name_en: Autonomous Action
- id: baker
  name: Зои Бейкер
  bio: Британская анархистка, историк и активистка. Член организации Solidarity Federation,
    ведёт подкаст об истории анархизма. Автор ряда работ о теории и истории анархистского
    движения.
  portrait: null
  name_en: Zoe Baker
- id: barmalei
  name: Бармалеи/Партизаны
  bio: null
  portrait: null
- id: basf
  name: BASF
  bio: null
  portrait: null
- id: bookchin
  name: Мюррей Букчин
  bio: Американский социальный теоретик и анархист (1921–2006). Разработал концепции
    «социальной экологии» и «либертарного муниципализма», объединяющие анархизм с
    экологической мыслью. Автор «Экологии свободы» и «Урбанизации без городов».
  portrait: null
  name_en: Murray Bookchin
- id: borovoy
  name: Алексей Боровой
  bio: Российский анархо-индивидуалист, философ и публицист (1875–1935). Один из видных
    теоретиков русского анархизма начала XX века, профессор московских университетов.
    Разрабатывал концепцию анархизма как освобождения личности от любых форм принуждения.
  portrait: null
  name_en: Alexei Borovoy
- id: budnitsky
  name: Олег Будницкий
  bio: Российский историк, специалист по истории революционного движения, еврейской
    истории России и эпохи Гражданской войны. Профессор Высшей школы экономики, автор
    монографий о терроризме, деньгах российской эмиграции и еврейском вопросе в революционную
    эпоху.
  portrait: null
  name_en: Oleg Budnitsky
- id: carson
  name: Кевин Карсон
  bio: Американский мутуалист и анархо-индивидуалист. Исследователь децентрализованных
    экономических моделей и критик корпоративного капитализма. Автор «Мутуалистской
    политической экономии» и «Организационной теории»; сотрудник Center for a Stateless
    Society.
  portrait: null
  name_en: Kevin Carson
- id: chernaya-chomga
  name: Черная чомга
  bio: null
  portrait: null
- id: clastres
  name: Пьер Кластр
  bio: Французский антрополог (1934–1977). Исследовал индейские народы Южной Америки.
    В книге «Общество против государства» обосновал тезис о том, что так называемые
    «примитивные» общества активно противостоят возникновению государственной власти
    — вопреки традиционным представлениям об «эволюции» к государственности.
  portrait: null
  name_en: Pierre Clastres
- id: cortazar
  name: Хулио Кортасар
  bio: Аргентино-французский прозаик (1914–1984). Один из крупнейших представителей
    латиноамериканской литературы XX века. Известен романом «Игра в классики» и циклами
    рассказов; его творчество сочетает магический реализм с политической ангажированностью.
  portrait: null
  name_en: Julio Cortázar
- id: de-cleyre
  name: Вольтарина Де Клер
  bio: Американская анархистка (1866–1912). Одна из ярчайших фигур американского анархизма
    рубежа XIX–XX веков. Сторонница «анархизма без прилагательных», поэтесса и блестящий
    оратор; её эссе и речи оказали значительное влияние на Эмму Гольдман.
  portrait: null
  name_en: Voltairine de Cleyre
- id: dominic
  name: Брайн А. Доминик
  bio: Американский анархист и веган-активист. Известен эссе «Освобождение животных
    и социальная революция» (1995), в котором ввёл в оборот термин «веганархизм».
    Утверждает, что подлинное социальное освобождение невозможно без пересмотра отношений
    между людьми и животными.
  portrait: null
  name_en: Brian A. Dominick
- id: dubovyk
  name: Анатолий Дубовик
  bio: Украинский историк анархизма. Специализируется на истории анархистского движения
    на территории бывшей Российской империи и в Украине. Автор и составитель многочисленных
    работ и документальных сборников по данной теме.
  portrait: null
  name_en: Anatoliy Dubovyk
- id: eichner
  name: Каролин Дж. Эйхнер
  bio: 'Американская историкесса, специалистка по истории феминизма и Парижской коммуны.
    Автор «Преодолевая баррикады: женщины в Парижской коммуне» — исследования о роли
    женщин в революционном движении XIX века. Профессор Университета Висконсин-Милуоки.'
  portrait: null
  name_en: Carolyn J. Eichner
- id: falkovsky
  name: Илья Фальковский
  bio: Российский писатель, журналист и медиахудожник. Лауреат премии Кандинского
    2008 года в категории «Медиа-арт». Автор документальных книг о молодёжном антифашистском
    движении и его жертвах в России.
  portrait: null
  name_en: Ilya Falkovsky
- id: fiskella
  name: Энтони Т. Фискелла
  bio: 'Американский исследователь с докторской степенью Лундского университета. Специализируется
    на пересечении анархизма и религии: изучает исламский анархизм и духовные измерения
    освободительных движений. Автор ряда статей и глав в академических сборниках.'
  portrait: null
  name_en: Anthony T. Fiscella
- id: foer
  name: Джонатан Фоер
  bio: Американский писатель. Известен романами «Полная иллюминация» и «Страшно близко
    & Запредельно громко». Автор «Вот почему мы не едим животных» — документального
    исследования современного животноводства и аргументации в пользу веганства.
  portrait: null
  name_en: Jonathan Safran Foer
- id: gapova
  name: Елена Гапова
  bio: Беларусская социологиня и гендерная исследовательница. Специализируется на постсоветских
    трансформациях, классе и гендере на постсоветском пространстве. Профессор Университета
    Западного Мичигана, автор работ о беларусском обществе и феминизме.
  portrait: null
  name_en: Elena Gapova
- id: gerasimov
  name: Николай Герасимов
  bio: null
  portrait: null
- id: gibson
  name: Тони Гибсон
  bio: Британский педагог и анархист, соратник Колина Варда. Работал в прогрессивных
    образовательных учреждениях и писал о применении анархистских принципов в педагогике
    и самоорганизации.
  portrait: null
  name_en: Tony Gibson
- id: glitterbomb
  name: Логан Мари Глиттербомб
  bio: Американская анархистская активистка, писательница и подкастер. Соучредительница
    Libertarian Anti-Fascist Committee, участница Industrial Workers of the World.
    Исследует агоризм, права трудящихся и квир-освобождение с позиций анархизма.
  portrait: null
  name_en: Logan Marie Glitterbomb
- id: goldman
  name: Эмма Гольдман
  bio: Русско-американская анархистка (1869–1940). Одна из наиболее известных анархистских
    активисток в истории. Боролась за права женщин, свободу слова и против войны;
    была депортирована из США в 1919 году. Автор «Анархизма и других эссе» и автобиографии
    «Живя своей жизнью».
  portrait: null
  name_en: Emma Goldman
- id: gorbunov-v
  name: Валентин Горбунов
  bio: null
  portrait: null
- id: gordiny
  name: Братья Гордины
  bio: Абба Гордин (1887–1964) и Вольф Гордин (1880–1956) — русско-еврейские анархисты.
    Разработали концепции «панархизма» и «интеранархизма». Активные участники российского
    анархистского движения начала XX века, впоследствии эмигрировавшие в США.
  portrait: null
  name_en: Gordon Brothers
- id: graeber
  name: Дэвид Грэбер
  bio: 'Американский антрополог и анархистский активист (1961–2020). Профессор Лондонской
    школы экономики, один из организаторов движения Occupy Wall Street. Автор «Долга:
    первые 5000 лет истории», «Утопии правил» и «Бредовой работы».'
  portrait: null
  name_en: David Graeber
- id: guillaume
  name: Джеймс Гильом
  bio: 'Швейцарский анархист (1844–1916). Близкий соратник Михаила Бакунина, один
    из основателей Юрской федерации Первого интернационала. Историк анархистского
    движения, автор многотомного «Интернационала: документов и воспоминаний».'
  portrait: null
  name_en: James Guillaume
- id: hakim-bey
  name: Хаким Бей (Питер Лэмборн Уилсон)
  bio: Американский анархистский писатель и поэт (1945–2022). Наиболее известен концепцией
    «Временных автономных зон» (ТАЗ) — пространств, временно свободных от государственного
    контроля. Оказал значительное влияние на постлевую и хакерскую культуру.
  portrait: null
  name_en: Hakim Bey (Peter Lamborn Wilson)
- id: hjugsson
  name: Анника Хьюгссон
  bio: null
  portrait: null
- id: ivanova-boreysho
  name: С.А. Иванова-Борейшо
  bio: Российская анархистка начала XX века. Участница анархистского движения в советский
    период; в 1926 году была арестована и выслана из Ленинграда за участие в подпольной
    анархистской деятельности.
  portrait: null
- id: kalinina
  name: Татьяна Калинина
  bio: null
  portrait: null
- id: khromyy
  name: Денис Хромый
  bio: null
  portrait: null
- id: konovalchyk
  name: Павлюк Коновальчик
  bio: null
  portrait: null
  name_en: Pavlyuk Konovalchyk
- id: kropotkin
  name: П.А. Кропоткин
  bio: Русский анархист-коммунист и учёный (1842–1921). Один из крупнейших теоретиков
    анархизма. Разработал концепцию взаимопомощи как движущей силы эволюции, противопоставив
    её дарвинистскому акценту на конкуренции. Автор «Взаимной помощи», «Хлеба и воли»
    и «Записок революционера».
  portrait: null
  name_en: Pyotr Kropotkin
- id: kunz
  name: Клаудия Кунц
  bio: Американская историкесса. Профессор Дьюкского университета, специалистка по
    истории нацизма и гендеру в Третьем рейхе. Автор «Матерей Отечества» (1987) об
    участии немецких женщин в нацизме и «Совести нацистов» (2003).
  portrait: null
  name_en: Claudia Koonz
- id: labadie
  name: Лоуренс Лабади
  bio: Американский анархо-индивидуалист (1898–1975). Сын известного анархиста Джо
    Лабади, продолжатель традиции Лизандра Спунера и Бенджамена Такера. Публиковался
    в анархистских изданиях, отстаивая принципы свободного рынка без государственного
    вмешательства.
  portrait: null
  name_en: Laurance Labadie
- id: libertad
  name: Альбер Либертад
  bio: Французский анархистский активист и журналист (1875–1908). Основатель и редактор
    газеты «L'Anarchie». Пропагандировал индивидуалистический анархизм и идею жизни
    «здесь и сейчас», отвергая традиционные революционные организации.
  portrait: null
  name_en: Albert Libertad
- id: libertariy-george
  name: Либертарий Джордж
  bio: null
  portrait: null
- id: liider
  name: Элейн Лиидэр
  bio: 'Американская социолог и профессор. Специализируется на истории анархизма,
    в особенности на роли женщин в анархистском движении. Автор «Нежного генерала:
    Роза Песотта, анархистка и профсоюзный организатор» (1993), редактор журнала Social
    Anarchism.'
  portrait: null
  name_en: Elaine Leeder
- id: makhno
  name: Нестор Махно
  bio: Украинский анархистский революционер (1888–1934). Возглавлял Революционную
    повстанческую армию Украины в годы Гражданской войны. Создал Вольную территорию
    — попытку построить анархистское общество на юге Украины; впоследствии эмигрировал
    во Францию.
  portrait: null
  name_en: Nestor Makhno
- id: mann
  name: Кит Манн
  bio: Британский активист за права животных. Провёл в общей сложности более десяти
    лет в заключении за свою деятельность. Автор «Вот в чём дело» — истории британского
    движения за права животных и личных свидетельств из жизни активиста.
  portrait: null
  name_en: Keith Mann
- id: markelov
  name: Станислав Маркелов
  bio: Российский адвокат, антифашистский активист и правозащитник (1974–2009). Защищал
    права политических заключённых, журналистов и жертв произвола силовых структур.
    Убит националистом в Москве 19 января 2009 года.
  portrait: null
  name_en: Stanislav Markelov
- id: memorial
  name: Международное общество «Мемориал»
  bio: Российская правозащитная организация, основанная в 1989 году. Документировала
    политические репрессии советской эпохи и современные нарушения прав человека в
    России и на постсоветском пространстве. Принудительно ликвидирована российскими
    властями в 2021–2022 годах.
  portrait: null
  name_en: Memorial International
- id: moltsberger
  name: Джон Молтсбергер
  bio: null
  portrait: null
- id: nechaev
  name: Сергей Нечаев
  bio: Русский революционер (1847–1882). Автор «Катехизиса революционера» — радикального
    манифеста, провозглашающего допустимость любых средств во имя революции. Его методы
    вдохновили образ Верховенского в «Бесах» Достоевского.
  portrait: null
  name_en: Sergei Nechaev
- id: nefor
  name: Саша «Нефор»
  bio: null
  portrait: null
- id: nettlau
  name: Макс Неттлау
  bio: Австрийский историк анархизма (1865–1944). Посвятил жизнь сбору и сохранению
    документов анархистского движения. Автор многотомной «Истории анархии» — наиболее
    полного историографического труда по данной теме; прозван «Геродотом анархизма».
  portrait: null
  name_en: Max Nettlau
- id: piper-mooney
  name: Ядвига Пипер-Муни
  bio: 'Американская историкесса польского происхождения. Специализируется на истории
    женщин, репродуктивной политике и правах человека в Латинской Америке и Польше.
    Автор «Политики материнства: родовспоможение и женское гражданство».'
  portrait: null
  name_en: Jadwiga Pieper Mooney
- id: podshivalov
  name: Игорь Подшивалов
  bio: Российский историк анархизма и сибирский активист (1962–2006). Основал анархистскую
    коммуну, исследовал крестьянские и шахтёрские восстания в Сибири 1918–1924 годов.
    Автор «Сибирской махновщины», переведённой на английский язык.
  portrait: null
  name_en: Igor Podshivalov
- id: rakhmaninova
  name: Мария Рахманинова
  bio: Российская анархистская философ. Доктор философских наук, специалистка по истории
    и теории анархизма, феминизму и постструктурализму. Автор ряда научных работ об
    анархистской мысли и современных формах освобождения.
  portrait: null
  name_en: Maria Rakhmaninova
- id: reclus
  name: Элизе Реклю
  bio: Французский географ и анархист (1830–1905). Один из крупнейших географов XIX
    века, создал монументальный труд «Земля и люди». Участник Парижской коммуны, сторонник
    анархо-коммунизма; его труды соединяют географическую науку с освободительной
    мыслью.
  portrait: null
  name_en: Élisée Reclus
- id: richards
  name: Вернон Ричардс
  bio: Британский анархист и фотограф (1915–2001). На протяжении десятилетий редактировал
    газету Freedom — старейшее анархистское издание в мире. Автор «Уроков испанской
    революции», жизненный партнёр Мари Луизы Бернери.
  portrait: null
  name_en: Vernon Richards
- id: romanov-i
  name: Илья Романов
  bio: Российский анархист из Нижнего Новгорода. Осуждён за поджог военного комиссариата
    в знак протеста против чеченской войны. Провёл несколько лет в заключении, став
    символом антивоенного сопротивления в российском анархистском движении.
  portrait: null
  name_en: Ilya Romanov
- id: ryabov
  name: Петр Рябов
  bio: Российский философ, историк и анархистский активист. Специалист по истории
    и теории анархизма, автор многочисленных работ о русском и мировом анархистском
    движении. Преподаватель философии, один из наиболее плодовитых современных авторов
    на тему анархизма в России.
  portrait: null
  name_en: Pyotr Ryabov
- id: sakhnin
  name: Алексей Сахнин
  bio: Российский левый активист, историк и журналист. Участник оппозиционного движения,
    в частности протестов 2011–2012 годов. Автор работ по истории левого движения
    в России, впоследствии эмигрировавший из страны.
  portrait: null
  name_en: Alexei Sakhnin
- id: scott
  name: Джеймс Скотт
  bio: Американский политолог и антрополог. Почётный профессор Йельского университета,
    известен работами о доминировании, повседневных формах сопротивления и критике
    государства. Автор «Оружия слабых», «Господства и искусства сопротивления» и «Против
    зерна».
  portrait: null
  name_en: James C. Scott
- id: shypunov
  name: Геннадій Шипунов
  bio: null
  portrait: null
  name_en: Gennadiy Shypunov
- id: snyder
  name: Гэри Снайдер
  bio: Американский поэт и эколог (1930). Лауреат Пулитцеровской премии (1975). Связан
    с движением «битников», буддист и приверженец глубинной экологии. Его поэзия вдохновлена
    природой, дзен-буддизмом и анархистской мыслью.
  portrait: null
  name_en: Gary Snyder
- id: thoreau
  name: Генри Торо
  bio: Американский писатель, философ и натуралист (1817–1862). Автор эссе «Гражданское
    неповиновение» — основополагающего текста для анархистской и правозащитной мысли,
    и книги «Уолден, или Жизнь в лесу». Один из первых теоретиков ненасильственного
    сопротивления государству.
  portrait: null
  name_en: Henry David Thoreau
- id: torres
  name: Боб Торрес
  bio: 'Американский социолог, автор и веган-анархист. Автор книги «Создавая рабов:
    капитализм, животные и господство» — анализа зоопромышленности с позиций политической
    экономии и анархизма. Соведущий подкаста Vegan Freak.'
  portrait: null
  name_en: Bob Torres
- id: ukrainka
  name: Леся Украинка
  bio: Украинская поэтесса и драматург (1871–1913). Одна из наиболее значимых фигур
    украинской литературы. Писала в жанрах романтизма и неоромантизма; её творчество
    проникнуто идеями свободы, борьбы с угнетением и национального самосознания.
  portrait: null
  name_en: Lesya Ukrainka
- id: vi
  name: Келли Ви
  bio: Американская анархистская писательница и активистка. Сотрудничает с Center
    for a Stateless Society; исследует анархо-феминизм и психическое здоровье с позиций
    освобождения. Работает на пересечении индивидуалистического анархизма и феминистской
    теории.
  portrait: null
  name_en: Kelly Vee
- id: volin
  name: Всеволод Волин
  bio: Русский анархист (1882–1945). Участник трёх революций, один из идеологов махновского
    движения. Автор труда «Неизвестная революция», посвящённого анархистскому опыту
    в ходе российской Гражданской войны. Разработал концепцию «синтетического анархизма».
  portrait: null
  name_en: Volin (Vsevolod Eichenbaum)
- id: watson
  name: Дэвид Уотсон
  bio: Американский анархистский автор и редактор, многолетний участник журнала «Fifth
    Estate», пишущий под псевдонимом Джордж Брэдфорд. Критик технологии и индустриального
    общества, автор «Против мегамашины» — сборника эссе о технократии и экологическом
    кризисе.
  portrait: null
  name_en: David Watson
- id: zerzan
  name: Джон Зерзан
  bio: Американский анархо-примитивистский философ и автор. Один из ведущих теоретиков
    анархо-примитивизма и зелёного анархизма. Критик цивилизации, технологий и символического
    мышления; автор «Будущего первобытного» и «Против цивилизации».
  portrait: null
  name_en: John Zerzan
- id: sappho
  name: Сапфо
  name_en: Sappho
  bio: Древнегреческая лирическая поэтесса (ок. 630–570 до н. э.) с острова Лесбос.
    Одна из величайших поэтесс античности, чьё имя стало нарицательным для обозначения
    женской однополой любви. Сохранились лишь фрагменты её стихов, проникнутых страстью,
    красотой и чувственностью.
  portrait: null
- id: parnok
  name: София Парнок
  name_en: Sofia Parnok
  bio: Российская поэтесса (1885–1933), известная как «русская Сапфо». Открытая лесбиянка,
    прославилась романом с Мариной Цветаевой, которому посвятила цикл «Подруга». Её
    поэзия отличается откровенностью в выражении женской любви и высоким художественным
    мастерством.
  portrait: null
- id: lord
  name: Одри Лорд
  name_en: Audre Lorde
  bio: Американская чернокожая поэтесса, феминистка и активистка (1934–1992). Описывала
    себя как «чёрную, лесбиянку, мать, воина, поэта». Автор «Зами», «Сестра-Аутсайдер»
    и многих стихотворных сборников; её творчество исследует расу, класс, пол и сексуальность.
  portrait: null
- id: jordan
  name: Джун Джордан
  name_en: June Jordan
  bio: Американская поэтесса и активистка (1936–2002). Профессор Калифорнийского университета
    в Беркли, основательница организации Poetry for the People. Её творчество посвящено
    вопросам расового равенства, феминизма, бисексуальности и политического освобождения.
  portrait: null
- id: gilligan
  name: Кэрол Гиллиган
  name_en: Carol Gilligan
  bio: Американская психолог (1936), профессор Нью-Йоркского университета. Известна
    книгой «Иным голосом» (1982), в которой показала гендерную предвзятость традиционных
    теорий морального развития. Одна из основательниц феминистской психологии и теории
    заботы.
  portrait: null
- id: snyder-n
  name: Наоми Снайдер
  name_en: Naomi Snyder Shafer
  bio: Американская исследовательница и соавтор Кэрол Гиллиган. Совместно с Гиллиган
    написала «Почему патриархат всё ещё существует?» — исследование о психологических
    механизмах, удерживающих патриархальные структуры.
  portrait: null
