authors:

  - id: gelderloos
    name: "Питер Гелдерлоос"
    name_en: "Peter Gelderloos"
    bio: >
      Американский анархист, активист и автор. Известен своей критикой
      ненасилия как политической стратегии и работами о тюремной системе.
      Участвовал в различных движениях социальной справедливости в США и
      Испании. Среди его книг — «Как ненасилие защищает государство»,
      «Анархия работает» и «Тюрьма».
    portrait: ~

  - id: malatesta
    name: "Эррико Малатеста"
    name_en: "Errico Malatesta"
    bio: >
      Итальянский анархист-коммунист (1853–1932). Один из наиболее значимых
      мыслителей анархизма, соратник Михаила Бакунина и Пётра Кропоткина.
      Посвятил жизнь революционной агитации и пропаганде анархистских идей
      по всему миру — в Италии, Великобритании, Аргентине и США.
    portrait: ~

  - id: black
    name: "Боб Блэк"
    name_en: "Bob Black"
    bio: >
      Американский анархист и постлевый мыслитель. Наиболее известен своим
      эссе «Упразднение работы» (1985), в котором критикует трудовую этику
      и отстаивает право людей на игру и свободное время как альтернативу
      отчуждённому наёмному труду.
    portrait: ~

  - id: dedok
    name: "Николай Дедок"
    name_en: "Nikolai Dedok"
    bio: >
      Беларусский анархист и политический заключённый. Провёл несколько лет
      в застенках белорусских тюрем за антиправительственную деятельность.
      Автор книги «Цвета параллельного мира» — документального свидетельства
      о жизни за решёткой и борьбе за человеческое достоинство.
    portrait: ~

  - id: ward
    name: "Колин Вард"
    name_en: "Colin Ward"
    bio: >
      Британский анархист и писатель (1924–2010). На протяжении десяти лет
      редактировал журнал Freedom. Его работы отличаются практическим подходом
      к анархизму, сосредоточенным на самоорганизации, взаимопомощи и
      горизонтальных структурах в повседневной жизни.
    portrait: ~

  - id: cameron
    name: "Сара Камерон"
    name_en: "Sarah Cameron"
    bio: >
      Историкесса, специализирующаяся на истории Советского Союза
      и Центральной Азии. Авторка книги «Голодная степь: голод, насилие и
      создание Советского Казахстана» — исследования о советской
      коллективизации и её катастрофических последствиях.
    portrait: ~

  - id: glushakov
    name: "Юрий Глушаков"
    name_en: "Yuri Glushakov"
    bio: >
      Беларусский историк и публицист анархистских взглядов. Исследует историю
      революционных и анархистских движений на территории бывшей Российской
      империи и СССР, в особенности на территории Беларуси.
    portrait: ~

  - id: crimethinc
    name: "CrimethInc."
    name_en: "CrimethInc."
    bio: >
      Децентрализованный анархистский коллектив, существующий с 1990-х годов.
      Публикует книги, брошюры и другие материалы, пропагандирующие анархизм,
      антикапитализм и прямое действие. «Борьба за наши жизни» — одна из их
      наиболее известных работ.
    portrait: ~

  - id: kosovo
    name: "Петя Косово"
    name_en: "Petya Kosovo"
    bio: >
      Так же известен как Петр Силаев.
      Писатель, антифашист, политбеженец, бывший вокалист группы "Проверочная линейка".
      Покинул Россию в 2010 году после акции левых активистов у здания горадминистрации Химок, одним из организаторов которой следствие считало его.
    portrait: ~
